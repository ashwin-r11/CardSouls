<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 620" width="420" height="620" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Inner glow for image frame -->
    <filter id="innerGlow">
      <feComposite in="SourceGraphic" in2="SourceGraphic" operator="over"/>
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Noise texture overlay -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Gradient: card background -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="100%" stop-color="#F0EDE6"/>
    </linearGradient>

    <!-- Gradient: header accent bar -->
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="28%" stop-color="#D94F3D"/>
      <stop offset="56%" stop-color="#3A6EA5"/>
      <stop offset="78%" stop-color="#2A9D74"/>
      <stop offset="100%" stop-color="#2C2C2C"/>
    </linearGradient>

    <!-- Gradient: image area bg -->
    <linearGradient id="imgBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E4DC"/>
      <stop offset="100%" stop-color="#D0CAC0"/>
    </linearGradient>

    <!-- Subtle corner decoration gradient -->
    <radialGradient id="cornerDeco" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#E8C840" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E8C840" stop-opacity="0"/>
    </radialGradient>

    <!-- Spotify green -->
    <radialGradient id="spotifyGreen" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1ED760"/>
      <stop offset="100%" stop-color="#1AA34A"/>
    </radialGradient>

    <!-- Clip for card shape -->
    <clipPath id="cardClip">
      <rect x="0" y="0" width="420" height="620" rx="28" ry="28"/>
    </clipPath>

    <!-- Clip for image area -->
    <clipPath id="imgClip">
      <rect x="20" y="66" width="380" height="310" rx="14" ry="14"/>
    </clipPath>

    <!-- Dotted pattern for image placeholder -->
    <pattern id="dotPattern" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1.2" fill="#B0A898" fill-opacity="0.45"/>
    </pattern>
  </defs>

  <!-- ═══════════════════════════════════════
       CARD BODY
  ═══════════════════════════════════════ -->
  <g filter="url(#cardShadow)">
    <!-- Card base -->
    <rect x="0" y="0" width="420" height="620" rx="28" ry="28" fill="url(#cardBg)"/>

    <!-- Top-left decorative corner radial wash -->
    <rect x="0" y="0" width="180" height="180" rx="28" ry="0" fill="url(#cornerDeco)" clip-path="url(#cardClip)"/>

    <!-- Thin accent top border line -->
    <rect x="0" y="0" width="420" height="5" rx="0" fill="url(#accentBar)" clip-path="url(#cardClip)"/>

    <!-- ── HEADER ZONE ── -->
    <!-- Series tag / category pill (top-left) -->
    <rect x="20" y="16" width="92" height="22" rx="11" fill="#2C2C2C"/>
    <text x="66" y="31.5" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" font-weight="700" fill="#E8C840" letter-spacing="1.2">SERIES TAG</text>

    <!-- Card number (top-left of pill row) -->
    <text x="122" y="31" font-family="'Courier New', monospace" font-size="10" fill="#888" font-weight="400" letter-spacing="0.5">#000</text>

    <!-- CHARACTER NAME — top right, bold serif -->
    <text x="400" y="33" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#1A1A1A" letter-spacing="0.3">Character Name</text>

    <!-- Thin separator under header -->
    <line x1="20" y1="52" x2="400" y2="52" stroke="#D5CFC4" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- ── IMAGE ZONE ── -->
    <!-- Image frame shadow inset -->
    <rect x="20" y="62" width="380" height="318" rx="16" fill="#C4BCAF" opacity="0.4"/>
    <!-- Image area background -->
    <rect x="20" y="66" width="380" height="310" rx="14" fill="url(#imgBg)" clip-path="url(#imgClip)"/>
    <!-- Dot texture inside image area -->
    <rect x="20" y="66" width="380" height="310" rx="14" fill="url(#dotPattern)" clip-path="url(#imgClip)"/>

    <!-- Center "Character Art" placeholder label -->
    <text x="210" y="216" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#9E9484" font-style="italic" opacity="0.7">Character Art</text>
    <!-- small dashed rectangle hint -->
    <rect x="120" y="190" width="180" height="40" rx="6" fill="none" stroke="#B0A898" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.5"/>

    <!-- Image frame border -->
    <rect x="20" y="66" width="380" height="310" rx="14" fill="none" stroke="#C2B89E" stroke-width="1.8"/>

    <!-- ── METADATA STRIP (below image, inside card) ── -->
    <!-- Light divider strip background -->
    <rect x="20" y="382" width="380" height="28" rx="0" fill="#EDEAE1"/>
    <rect x="20" y="382" width="380" height="1" fill="#D0C9BB"/>
    <rect x="20" y="410" width="380" height="1" fill="#D0C9BB"/>

    <!-- Color palette swatches — 5 swatches -->
    <rect x="28" y="389" width="14" height="14" rx="3.5" fill="#E8C840"/>
    <rect x="46" y="389" width="14" height="14" rx="3.5" fill="#D94F3D"/>
    <rect x="64" y="389" width="14" height="14" rx="3.5" fill="#3A6EA5"/>
    <rect x="82" y="389" width="14" height="14" rx="3.5" fill="#2A9D74"/>
    <rect x="100" y="389" width="14" height="14" rx="3.5" fill="#2C2C2C"/>

    <!-- "Generated • Date" label — right-aligned in strip -->
    <text x="394" y="400" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#8C8070" letter-spacing="0.8">Generated • Date</text>

    <!-- ── QUOTE AREA ── -->
    <!-- Quote text — centered, italic serif, larger -->
    <text text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15.5" font-style="italic" fill="#3A3530" letter-spacing="0.3">
      <tspan x="210" y="438">There is no one who loves pain itself,</tspan>
      <tspan x="210" dy="22">who seeks after it and wants to have it,</tspan>
      <tspan x="210" dy="22">simply because it is pain...</tspan>
    </text>

    <!-- decorative left quote mark — tucked close to first line -->
    <text x="18" y="443" font-family="Georgia, serif" font-size="48" fill="#E8C840" opacity="0.60" font-style="italic">"</text>

    <!-- closing quote mark — tucked close to last line -->
    <text x="402" y="484" text-anchor="end" font-family="Georgia, serif" font-size="48" fill="#E8C840" opacity="0.60" font-style="italic">"</text>

    <!-- ── SPOTIFY BARCODE SECTION ── -->
    <!-- Outer pill container -->
    <rect x="70" y="500" width="280" height="70" rx="35" fill="white" stroke="#1A1A1A" stroke-width="2.2"/>

    <!-- Spotify logo circle -->
    <circle cx="210" cy="535" r="22" fill="url(#spotifyGreen)"/>
    <!-- Spotify icon (3 arcs) -->
    <path d="M200 527 Q210 522 221 526" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M198 532 Q210 526 223 531" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M200 537 Q210 532 221 536" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Left barcode lines — varying heights, organic feel -->
    <g fill="#1A1A1A">
      <rect x="82"  y="525" width="2.2" height="20" rx="1"/>
      <rect x="86.5" y="521" width="1.5" height="28" rx="1"/>
      <rect x="90"  y="527" width="3"   height="16" rx="1"/>
      <rect x="95"  y="523" width="1.5" height="24" rx="1"/>
      <rect x="99"  y="529" width="2.5" height="12" rx="1"/>
      <rect x="103.5" y="520" width="1.5" height="30" rx="1"/>
      <rect x="107" y="526" width="2"   height="18" rx="1"/>
      <rect x="111" y="524" width="1.5" height="22" rx="1"/>
      <rect x="115" y="528" width="2.5" height="14" rx="1"/>
      <rect x="119.5" y="522" width="1.5" height="26" rx="1"/>
      <rect x="123" y="527" width="2"   height="16" rx="1"/>
      <rect x="127" y="521" width="1.5" height="28" rx="1"/>
      <rect x="131" y="525" width="3"   height="20" rx="1"/>
      <rect x="136" y="523" width="1.5" height="24" rx="1"/>
      <rect x="140" y="529" width="2"   height="12" rx="1"/>
      <rect x="144" y="520" width="1.5" height="30" rx="1"/>
      <rect x="148" y="526" width="2.5" height="18" rx="1"/>
      <rect x="153" y="524" width="1.5" height="22" rx="1"/>
      <rect x="157" y="530" width="2"   height="10" rx="1"/>
      <rect x="161" y="522" width="1.5" height="26" rx="1"/>
      <rect x="165" y="527" width="2"   height="16" rx="1"/>
      <rect x="169" y="521" width="2.5" height="28" rx="1"/>
      <rect x="174" y="525" width="1.5" height="20" rx="1"/>
      <rect x="178" y="524" width="2"   height="22" rx="1"/>
      <rect x="182" y="529" width="1.5" height="12" rx="1"/>
    </g>

    <!-- Right barcode lines -->
    <g fill="#1A1A1A">
      <rect x="238" y="529" width="1.5" height="12" rx="1"/>
      <rect x="242" y="524" width="2"   height="22" rx="1"/>
      <rect x="246.5" y="525" width="1.5" height="20" rx="1"/>
      <rect x="250" y="521" width="2.5" height="28" rx="1"/>
      <rect x="254.5" y="527" width="2"   height="16" rx="1"/>
      <rect x="259" y="522" width="1.5" height="26" rx="1"/>
      <rect x="263" y="529" width="1.5" height="12" rx="1"/>
      <rect x="267" y="521" width="2"   height="28" rx="1"/>
      <rect x="271.5" y="527" width="1.5" height="16" rx="1"/>
      <rect x="275" y="524" width="2.5" height="22" rx="1"/>
      <rect x="280" y="530" width="1.5" height="10" rx="1"/>
      <rect x="284" y="522" width="2"   height="26" rx="1"/>
      <rect x="288" y="526" width="1.5" height="18" rx="1"/>
      <rect x="292" y="524" width="2.5" height="22" rx="1"/>
      <rect x="297" y="529" width="1.5" height="12" rx="1"/>
      <rect x="301" y="520" width="2"   height="30" rx="1"/>
      <rect x="305.5" y="527" width="1.5" height="16" rx="1"/>
      <rect x="309" y="521" width="2"   height="28" rx="1"/>
      <rect x="313.5" y="525" width="3"   height="20" rx="1"/>
      <rect x="318.5" y="522" width="1.5" height="26" rx="1"/>
      <rect x="322" y="528" width="2.5" height="14" rx="1"/>
      <rect x="326.5" y="520" width="1.5" height="30" rx="1"/>
      <rect x="330" y="526" width="2"   height="18" rx="1"/>
      <rect x="334" y="527" width="2"   height="16" rx="1"/>
      <rect x="338" y="523" width="1.5" height="24" rx="1"/>
    </g>

    <!-- ── BOTTOM FOOTER ── -->
    <!-- Bottom accent bar -->
    <rect x="0" y="614" width="420" height="6" rx="0" fill="url(#accentBar)" clip-path="url(#cardClip)"/>

    <!-- Outer card border -->
    <rect x="0" y="0" width="420" height="620" rx="28" ry="28" fill="none" stroke="#C2B89E" stroke-width="1.5"/>

    <!-- Inner card inset border for polish -->
    <rect x="6" y="6" width="408" height="608" rx="23" ry="23" fill="none" stroke="#E2DBD0" stroke-width="0.8" opacity="0.7"/>
  </g>
</svg>